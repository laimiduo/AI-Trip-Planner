<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI旅行助手</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563eb',
            secondary: '#10b981',
          }
        }
      }
    }
  </script>
  <style>
    .loading-spinner { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .progress-step-active { @apply text-blue-600 font-semibold; }
    .progress-step-done { @apply text-green-600; }
    .progress-step-pending { @apply text-gray-400; }
  </style>
</head>
<body class="h-full bg-gradient-to-br from-blue-50 to-indigo-100">

<div class="min-h-screen flex flex-col">
  <!-- Header -->
  <header class="bg-primary text-white shadow-lg">
    <div class="max-w-6xl mx-auto px-4 py-6">
      <h1 class="text-3xl font-bold flex items-center gap-3">
        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 004 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        AI旅行助手 v2
      </h1>
      <p class="mt-2 text-lg opacity-90">智能规划你的完美行程 — 更快、更详尽</p>
      <div class="mt-4 flex gap-3">
        <button onclick="toggleSidebar()" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-lg transition flex items-center gap-2 text-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          历史记录
        </button>
      </div>
    </div>
  </header>

  <main class="flex-1 max-w-6xl mx-auto w-full px-4 py-8">
    <!-- 表单区域 -->
    <div id="form-section" class="bg-white rounded-xl shadow-xl p-8 mb-12">
      <h2 class="text-2xl font-bold mb-6 text-gray-800">规划你的旅行</h2>
      <form id="trip-form" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- 第1列 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">目的地城市 *</label>
          <input type="text" name="city" required placeholder="例如：北京" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">开始日期 *</label>
          <input type="date" name="start_date" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">结束日期 *</label>
          <input type="date" name="end_date" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary">
        </div>

        <!-- 第2列 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">交通方式 *</label>
          <input type="text" name="transportation" required placeholder="例如：公共公交、自驾" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">住宿类型 *</label>
          <input type="text" name="accommodation" required placeholder="例如：经济型酒店、民宿" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">出行人数</label>
          <input type="number" name="traveler_count" value="1" min="1" max="50" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary">
        </div>

        <!-- 第3列 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">出行类型</label>
          <select name="traveler_type" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary">
            <option value="solo">单人出行</option>
            <option value="couple">情侣 / 夫妻</option>
            <option value="family_kids">家庭（带小孩）</option>
            <option value="friends">朋友结伴</option>
            <option value="business">商务出行</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">最低预算（元）</label>
          <input type="number" name="budget_min" min="0" placeholder="例如：2000" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">最高预算（元）</label>
          <input type="number" name="budget_max" min="0" placeholder="例如：5000" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary">
        </div>

        <!-- 全宽行 -->
        <div class="md:col-span-3">
          <label class="block text-sm font-medium text-gray-700 mb-2">行程节奏</label>
          <div class="flex gap-6">
            <label class="flex items-center"><input type="radio" name="pace" value="relaxed" class="mr-2"> 轻松（每天1-2个景点）</label>
            <label class="flex items-center"><input type="radio" name="pace" value="moderate" checked class="mr-2"> 适中（每天2-3个景点）</label>
            <label class="flex items-center"><input type="radio" name="pace" value="intensive" class="mr-2"> 紧凑（每天3-4个景点）</label>
          </div>
        </div>
        <div class="md:col-span-3">
          <label class="block text-sm font-medium text-gray-700 mb-2">偏好（多个用逗号分隔）</label>
          <input type="text" name="preferences" placeholder="例如：历史文化,美食,自然风光" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary">
        </div>
        <div class="md:col-span-3">
          <label class="block text-sm font-medium text-gray-700 mb-2">饮食偏好（逗号分隔）</label>
          <input type="text" name="cuisine_preferences" placeholder="例如：川菜,海鲜,本地小吃" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary">
        </div>
        <div class="md:col-span-3">
          <label class="block text-sm font-medium text-gray-700 mb-2">额外要求</label>
          <textarea name="free_text_input" rows="2" placeholder="例如：多安排博物馆，避免拥挤景点" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary"></textarea>
        </div>
        <div class="md:col-span-3">
          <button type="submit" class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-lg transition flex items-center justify-center gap-3 text-lg">
            <svg class="w-6 h-6 loading-spinner hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" opacity="0.3"/><path d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" fill="currentColor"/></svg>
            <span>生成行程计划</span>
          </button>
        </div>
      </form>
    </div>

    <!-- 进度区域 -->
    <div id="progress-section" class="hidden bg-white rounded-xl shadow-xl p-8 mb-12">
      <h3 class="text-xl font-bold mb-6 text-gray-800">正在生成旅行计划...</h3>
      <div class="space-y-4">
        <div id="step-1" class="step-item flex items-center gap-4 text-gray-400">
          <span class="step-circle w-8 h-8 rounded-full border-2 border-gray-300 flex items-center justify-center text-sm font-bold shrink-0">1</span>
          <div><p class="font-medium">查询天气信息</p><p class="text-sm text-gray-500">获取目的地的天气预报数据</p></div>
        </div>
        <div id="step-2" class="step-item flex items-center gap-4 text-gray-400">
          <span class="step-circle w-8 h-8 rounded-full border-2 border-gray-300 flex items-center justify-center text-sm font-bold shrink-0">2</span>
          <div><p class="font-medium">搜索景点</p><p class="text-sm text-gray-500">根据偏好搜索热门景点</p></div>
        </div>
        <div id="step-3" class="step-item flex items-center gap-4 text-gray-400">
          <span class="step-circle w-8 h-8 rounded-full border-2 border-gray-300 flex items-center justify-center text-sm font-bold shrink-0">3</span>
          <div><p class="font-medium">搜索酒店</p><p class="text-sm text-gray-500">查找推荐住宿信息</p></div>
        </div>
        <div id="step-4" class="step-item flex items-center gap-4 text-gray-400">
          <span class="step-circle w-8 h-8 rounded-full border-2 border-gray-300 flex items-center justify-center text-sm font-bold shrink-0">4</span>
          <div><p class="font-medium">生成行程计划</p><p class="text-sm text-gray-500">AI 正在整合所有信息规划行程</p></div>
        </div>
      </div>
    </div>

    <!-- 结果区域 -->
    <div id="result-section" class="hidden">
      <div class="bg-white rounded-xl shadow-xl p-8">
        <div class="flex justify-between items-center mb-6 flex-wrap gap-4">
          <h2 class="text-3xl font-bold text-gray-800" id="plan-title"></h2>
          <button onclick="resetView()" class="text-primary hover:underline font-medium">重新规划</button>
        </div>

        <!-- 概览卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
          <div class="bg-blue-50 rounded-lg p-4">
            <p class="text-sm text-gray-600">旅行日期</p>
            <p class="text-lg font-bold" id="plan-dates"></p>
          </div>
          <div class="bg-yellow-50 rounded-lg p-4">
            <p class="text-sm text-gray-600">预估总预算</p>
            <p class="text-2xl font-bold text-yellow-600" id="plan-budget"></p>
          </div>
          <div class="bg-purple-50 rounded-lg p-4">
            <p class="text-sm text-gray-600">人均预算</p>
            <p class="text-2xl font-bold text-purple-600" id="plan-budget-per-person"></p>
          </div>
        </div>

        <!-- 总体建议（独立一行） -->
        <div id="suggestions-row" class="hidden mb-8 bg-gradient-to-r from-green-50 to-emerald-50 rounded-lg p-5 border-l-4 border-green-400">
          <p class="text-sm text-gray-500 mb-1">💡 总体建议</p>
          <p class="text-base text-gray-800 leading-relaxed whitespace-pre-line" id="plan-suggestions"></p>
        </div>

        <!-- 最佳出行时间（有数据才显示） -->
        <div id="best-time-tips" class="hidden mb-8 bg-indigo-50 rounded-lg p-4 border-l-4 border-indigo-400">
          <p class="font-medium text-indigo-800">📅 最佳出行时间</p>
          <p class="text-sm mt-1 text-indigo-700" id="plan-best-time"></p>
        </div>

        <!-- 预算明细 -->
        <div id="budget-breakdown" class="hidden mb-8 bg-gray-50 rounded-lg p-6">
          <h3 class="text-lg font-bold mb-3">预算明细</h3>
          <div class="grid grid-cols-2 md:grid-cols-5 gap-3 text-sm" id="budget-items"></div>
        </div>

        <!-- 天气信息 -->
        <div class="mb-8">
          <h3 class="text-xl font-bold mb-4">天气预报</h3>
          <div id="weather-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>

        <!-- 每日行程 -->
        <div>
          <h3 class="text-xl font-bold mb-6">详细行程</h3>
          <div id="days-accordion" class="space-y-4"></div>
        </div>
      </div>
    </div>

    <!-- 错误提示 -->
    <div id="error-alert" class="hidden fixed top-4 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-8 py-4 rounded-lg shadow-2xl z-50">
      <p id="error-message"></p>
    </div>
  </main>
</div>

<!-- 侧边栏遮罩 -->
<div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/30 z-40 transition-opacity" onclick="toggleSidebar()"></div>

<!-- 历史记录侧边栏 -->
<div id="history-sidebar" class="hidden fixed top-0 left-0 h-full w-80 bg-white shadow-2xl z-50 -translate-x-full transition-transform duration-300 overflow-y-auto">
  <div class="p-5">
    <div class="flex justify-between items-center mb-6">
      <h3 class="text-lg font-bold text-gray-800">📋 历史记录</h3>
      <button onclick="toggleSidebar()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
    </div>
    <div id="history-list" class="space-y-3">
      <p class="text-gray-400 text-center py-8">加载中...</p>
    </div>
  </div>
</div>

<script>
  const form = document.getElementById('trip-form');
  const spinner = document.querySelector('.loading-spinner');
  const submitText = document.querySelector('button[type="submit"] span');

  // === 进度条更新 ===
  function updateProgress(step) {
    for (let i = 1; i <= 4; i++) {
      const el = document.getElementById(`step-${i}`);
      const circle = el.querySelector('.step-circle');
      const label = el.querySelector('.font-medium');
      if (i < step) {
        el.className = 'step-item flex items-center gap-4 text-green-600';
        circle.className = 'step-circle w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold shrink-0 bg-green-600 text-white border-green-600';
      } else if (i === step) {
        el.className = 'step-item flex items-center gap-4 text-blue-600 font-semibold';
        circle.className = 'step-circle w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold shrink-0 bg-blue-600 text-white border-blue-600';
      } else {
        el.className = 'step-item flex items-center gap-4 text-gray-400';
        circle.className = 'step-circle w-8 h-8 rounded-full border-2 border-gray-300 flex items-center justify-center text-sm font-bold shrink-0';
      }
    }
  }

  function resetView() {
    document.getElementById('result-section').classList.add('hidden');
    document.getElementById('progress-section').classList.add('hidden');
    document.getElementById('form-section').classList.remove('hidden');
  }

  // === SSE 流式解析 ===
  async function submitTripPlan(data) {
    document.getElementById('form-section').classList.add('hidden');
    document.getElementById('progress-section').classList.remove('hidden');
    document.getElementById('result-section').classList.add('hidden');
    updateProgress(0);

    try {
      const response = await fetch('/api/v1/trip/plan/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';  // 保留不完整行

        let currentEvent = '';
        for (const line of lines) {
          if (line.startsWith('event: ')) {
            currentEvent = line.slice(7).trim();
          } else if (line.startsWith('data: ')) {
            const payloadStr = line.slice(6);
            try {
              const payload = JSON.parse(payloadStr);
              if (currentEvent === 'progress') {
                updateProgress(payload.step);
              } else if (currentEvent === 'result') {
                document.getElementById('progress-section').classList.add('hidden');
                currentPlanId = null;
                renderPlan(payload);
                document.getElementById('result-section').classList.remove('hidden');
                loadHistory();
              } else if (currentEvent === 'error') {
                throw new Error(payload.message);
              }
            } catch (parseErr) {
              // JSON parse error for this line, skip
            }
          }
        }
      }
    } catch (err) {
      showError(err.message || '网络错误，请检查后端是否运行');
      resetView();
    } finally {
      spinner.classList.add('hidden');
      submitText.textContent = '生成行程计划';
    }
  }

  // === 表单提交 ===
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    spinner.classList.remove('hidden');
    submitText.textContent = '规划中...';

    const formData = new FormData(form);
    const preferences = formData.get('preferences').split(',').map(p => p.trim()).filter(p => p);
    const cuisine = formData.get('cuisine_preferences').split(',').map(p => p.trim()).filter(p => p);
    const budgetMin = formData.get('budget_min');
    const budgetMax = formData.get('budget_max');

    const data = {
      city: formData.get('city'),
      start_date: formData.get('start_date'),
      end_date: formData.get('end_date'),
      travel_days: Math.ceil((new Date(formData.get('end_date')) - new Date(formData.get('start_date'))) / (1000 * 60 * 60 * 24)) + 1,
      transportation: formData.get('transportation'),
      accommodation: formData.get('accommodation'),
      preferences: preferences,
      free_text_input: formData.get('free_text_input') || '',
      traveler_count: parseInt(formData.get('traveler_count')) || 1,
      traveler_type: formData.get('traveler_type') || 'solo',
      pace: document.querySelector('input[name="pace"]:checked')?.value || 'moderate',
      cuisine_preferences: cuisine,
      budget_min: budgetMin ? parseInt(budgetMin) : null,
      budget_max: budgetMax ? parseInt(budgetMax) : null
    };

    await submitTripPlan(data);
  });

  // === 渲染结果 ===
  function renderPlan(plan) {
    document.getElementById('plan-title').textContent = `${plan.city} ${plan.days.length}天旅行计划`;
    document.getElementById('plan-dates').textContent = `${plan.start_date} ~ ${plan.end_date}`;

    // 总体建议（独立一行）
    const suggestionsRow = document.getElementById('suggestions-row');
    const suggestionsEl = document.getElementById('plan-suggestions');
    if (plan.overall_suggestions) {
      suggestionsEl.textContent = plan.overall_suggestions;
      suggestionsRow.classList.remove('hidden');
    } else {
      suggestionsRow.classList.add('hidden');
    }

    document.getElementById('plan-budget').textContent = plan.budget ? `¥${plan.budget.total}` : '未提供';
    document.getElementById('plan-budget-per-person').textContent = plan.budget_per_person ? `¥${plan.budget_per_person}` : '未提供';

    // 最佳出行时间（有数据才显示）
    const bestTimeTips = document.getElementById('best-time-tips');
    if (plan.best_time_tips) {
      document.getElementById('plan-best-time').textContent = plan.best_time_tips;
      bestTimeTips.classList.remove('hidden');
    } else {
      bestTimeTips.classList.add('hidden');
    }

    // 预算明细
    if (plan.budget) {
      document.getElementById('budget-breakdown').classList.remove('hidden');
      const items = [
        { label: '景点门票', value: plan.budget.total_attractions, color: 'bg-blue-500' },
        { label: '酒店住宿', value: plan.budget.total_hotels, color: 'bg-green-500' },
        { label: '餐饮', value: plan.budget.total_meals, color: 'bg-yellow-500' },
        { label: '交通', value: plan.budget.total_transportation, color: 'bg-purple-500' },
        { label: '总计', value: plan.budget.total, color: 'bg-red-500', bold: true },
      ];
      const container = document.getElementById('budget-items');
      container.innerHTML = items.map(item => `
        <div class="bg-white rounded-lg p-3 text-center ${item.bold ? 'ring-2 ring-red-200' : ''}">
          <p class="text-gray-500">${item.label}</p>
          <p class="text-lg font-bold">¥${item.value}</p>
        </div>
      `).join('');
    } else {
      document.getElementById('budget-breakdown').classList.add('hidden');
    }

    // 天气
    const weatherGrid = document.getElementById('weather-grid');
    weatherGrid.innerHTML = '';
    if (plan.weather_info && plan.weather_info.length > 0) {
      plan.weather_info.forEach(w => {
        weatherGrid.innerHTML += `
          <div class="bg-sky-50 rounded-lg p-4 text-center shadow-sm">
            <p class="font-semibold text-gray-700">${w.date}</p>
            <p class="text-3xl my-2">${getWeatherEmoji(w.day_weather)}</p>
            <p class="text-lg font-bold">${w.day_weather} ${w.day_temp}°C</p>
            <p class="text-sm text-gray-500">夜间 ${w.night_weather} ${w.night_temp}°C</p>
            <p class="text-xs text-gray-400 mt-1">${w.wind_direction} ${w.wind_power}</p>
          </div>
        `;
      });
    } else {
      weatherGrid.innerHTML = '<p class="text-gray-500 col-span-4">暂无天气数据</p>';
    }

    // 每日行程
    const daysAccordion = document.getElementById('days-accordion');
    daysAccordion.innerHTML = '';
    plan.days.forEach((day, idx) => {
      const dayNum = idx + 1;
      daysAccordion.innerHTML += `
        <div class="border border-gray-200 rounded-lg overflow-hidden shadow-sm">
          <button class="day-header w-full bg-primary text-white font-bold py-4 px-6 text-left flex justify-between items-center hover:bg-blue-700 transition">
            <span>第 ${dayNum} 天（${day.date}）— ${day.description}</span>
            <svg class="w-6 h-6 transform transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div class="day-content hidden bg-gray-50 p-6 space-y-6">
            <!-- 交通 & 住宿 -->
            <div>
              <h4 class="font-semibold text-lg mb-2 flex items-center gap-2">🚗 交通 & 住宿</h4>
              <div class="bg-white p-4 rounded-lg">
                <p><span class="font-medium">交通：</span>${day.transportation}</p>
                <p><span class="font-medium">住宿：</span>${day.accommodation}</p>
                ${day.hotel ? `<div class="mt-3 p-3 bg-blue-50 rounded-lg"><p class="font-medium">${day.hotel.name}</p><p class="text-sm text-gray-600">${day.hotel.address || ''}</p><p class="text-sm font-bold mt-1">预估：¥${day.hotel.estimated_cost}</p></div>` : ''}
              </div>
            </div>

            <!-- 交通建议 -->
            ${day.traffic_tips && day.traffic_tips.length > 0 ? `
            <div>
              <h4 class="font-semibold text-lg mb-2 flex items-center gap-2">🚌 交通建议</h4>
              <div class="space-y-2">
                ${day.traffic_tips.map(t => `
                  <div class="bg-white p-3 rounded-lg flex gap-3 items-start">
                    <span class="text-sm font-bold text-blue-600 bg-blue-100 px-2 py-1 rounded shrink-0">${t.time}</span>
                    <span class="text-gray-700">${t.tip}</span>
                  </div>
                `).join('')}
              </div>
            </div>` : ''}

            <!-- 景点 -->
            <div>
              <h4 class="font-semibold text-lg mb-3 flex items-center gap-2">🏛 景点</h4>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                ${day.attractions.map(a => `
                  <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100">
                    <p class="font-medium text-lg text-blue-800">${a.name}</p>
                    <p class="text-sm text-gray-500">${a.address}</p>
                    <p class="mt-2 text-sm text-gray-700">${a.description}</p>
                    <div class="mt-2 flex flex-wrap gap-2 text-sm">
                      <span class="bg-gray-100 px-2 py-1 rounded">🕐 ${a.visit_duration}分钟</span>
                      <span class="bg-gray-100 px-2 py-1 rounded">🎫 ¥${a.ticket_price}</span>
                      ${a.category ? `<span class="bg-gray-100 px-2 py-1 rounded">🏷 ${a.category}</span>` : ''}
                      ${a.rating ? `<span class="bg-gray-100 px-2 py-1 rounded">⭐ ${a.rating}</span>` : ''}
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>

            <!-- 餐饮 -->
            <div>
              <h4 class="font-semibold text-lg mb-3 flex items-center gap-2">🍽 餐饮</h4>
              <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                ${day.meals.map(m => `
                  <div class="bg-white p-4 rounded-lg text-center shadow-sm border border-gray-100">
                    <p class="font-medium text-sm text-gray-500">${m.type === 'breakfast' ? '🌅 早餐' : m.type === 'lunch' ? '☀️ 午餐' : '🌙 晚餐'}</p>
                    <p class="mt-1 font-semibold">${m.name}</p>
                    <p class="text-xs text-gray-500 mt-1">${m.description || ''}</p>
                    <p class="mt-2 font-bold text-green-700">¥${m.estimated_cost}</p>
                  </div>
                `).join('')}
              </div>
            </div>

            <!-- 打包建议 -->
            ${day.packing_suggestions && day.packing_suggestions.length > 0 ? `
            <div>
              <h4 class="font-semibold text-lg mb-2 flex items-center gap-2">🎒 携带建议</h4>
              <div class="flex flex-wrap gap-2">
                ${day.packing_suggestions.map(p => `
                  <span class="bg-white px-3 py-2 rounded-lg border border-gray-200 text-sm" title="${p.reason}">${p.item}</span>
                `).join('')}
              </div>
            </div>` : ''}

            <!-- 当地活动 -->
            ${day.local_events && day.local_events.length > 0 ? `
            <div>
              <h4 class="font-semibold text-lg mb-2 flex items-center gap-2">🎉 当地活动</h4>
              <div class="space-y-2">
                ${day.local_events.map(e => `
                  <div class="bg-white p-3 rounded-lg border-l-4 border-yellow-400">
                    <p class="font-medium">${e.name}</p>
                    <p class="text-sm text-gray-600">${e.description}</p>
                  </div>
                `).join('')}
              </div>
            </div>` : ''}
          </div>
        </div>
      `;
    });

    // 折叠功能
    document.querySelectorAll('.day-header').forEach(btn => {
      btn.addEventListener('click', () => {
        const content = btn.nextElementSibling;
        const icon = btn.querySelector('svg');
        content.classList.toggle('hidden');
        icon.classList.toggle('rotate-180');
      });
    });
    // 默认展开第一天
    const firstHeader = document.querySelector('.day-header');
    if (firstHeader) firstHeader.click();
  }

  function getWeatherEmoji(weather) {
    if (!weather) return '☀️';
    if (weather.includes('晴')) return '☀️';
    if (weather.includes('多云') || weather.includes('阴')) return '⛅';
    if (weather.includes('雨')) return '🌧️';
    if (weather.includes('雪')) return '❄️';
    if (weather.includes('雾') || weather.includes('霾')) return '🌫';
    if (weather.includes('风')) return '💨';
    return '🌤';
  }

  function showError(msg) {
    const alert = document.getElementById('error-alert');
    document.getElementById('error-message').textContent = msg;
    alert.classList.remove('hidden');
    setTimeout(() => alert.classList.add('hidden'), 6000);
  }

  // === 侧边栏: 历史记录 ===

  let currentPlanId = null;

  function toggleSidebar() {
    const sidebar = document.getElementById('history-sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const isHidden = sidebar.classList.contains('hidden');
    if (isHidden) {
      sidebar.classList.remove('hidden');
      overlay.classList.remove('hidden');
      // 确保 display:block 生效后再触发 transition
      requestAnimationFrame(() => {
        sidebar.classList.remove('-translate-x-full');
      });
    } else {
      sidebar.classList.add('-translate-x-full');
      setTimeout(() => {
        sidebar.classList.add('hidden');
        overlay.classList.add('hidden');
      }, 300);
      loadHistory();
    }
  }

  async function loadHistory() {
    const list = document.getElementById('history-list');
    list.innerHTML = '<p class="text-gray-400 text-center py-8">加载中...</p>';
    try {
      const resp = await fetch('/api/v1/trip/plans');
      const data = await resp.json();
      if (!data.success || !data.plans.length) {
        list.innerHTML = '<p class="text-gray-400 text-center py-8">暂无历史记录</p>';
        return;
      }
      list.innerHTML = data.plans.map(p => `
        <div class="bg-gray-50 rounded-lg p-4 border border-gray-200 hover:shadow-md transition ${currentPlanId === p.id ? 'ring-2 ring-primary' : ''}">
          <div class="flex justify-between items-start mb-2">
            <p class="font-bold text-lg text-blue-800">${p.city}</p>
            <span class="text-xs text-gray-400">${new Date(p.created_at).toLocaleString('zh-CN')}</span>
          </div>
          <p class="text-sm text-gray-600">${p.start_date} ~ ${p.end_date} (${p.travel_days}天)</p>
          <p class="text-sm text-gray-600">人数: ${p.traveler_count} | 预算: ¥${p.budget_total}</p>
          <div class="mt-3 flex gap-2">
            <button onclick="viewPlan('${p.id}')" class="flex-1 bg-primary text-white text-sm py-1.5 rounded hover:bg-blue-700 transition">查看</button>
            <button onclick="deletePlan('${p.id}')" class="px-3 text-sm py-1.5 rounded border border-red-300 text-red-600 hover:bg-red-50 transition">删除</button>
          </div>
        </div>
      `).join('');
    } catch (e) {
      list.innerHTML = '<p class="text-red-400 text-center py-8">加载失败</p>';
    }
  }

  async function viewPlan(planId) {
    try {
      const resp = await fetch(`/api/v1/trip/plans/${planId}`);
      const data = await resp.json();
      if (data.plan) {
        currentPlanId = planId;
        document.getElementById('form-section').classList.add('hidden');
        document.getElementById('progress-section').classList.add('hidden');
        document.getElementById('result-section').classList.remove('hidden');
        renderPlan(data.plan);
        // 刷新侧边栏高亮
        loadHistory();
        // 关闭侧边栏
        toggleSidebar();
      } else {
        showError('该计划没有详细数据');
      }
    } catch (e) {
      showError('加载计划失败');
    }
  }

  async function deletePlan(planId) {
    if (!confirm('确定要删除这条记录吗？')) return;
    try {
      const resp = await fetch(`/api/v1/trip/plans/${planId}`, { method: 'DELETE' });
      const data = await resp.json();
      if (data.success) {
        if (currentPlanId === planId) {
          currentPlanId = null;
          resetView();
        }
        loadHistory();
      } else {
        showError('删除失败');
      }
    } catch (e) {
      showError('删除失败');
    }
  }

  // 页面加载时拉取历史
  document.addEventListener('DOMContentLoaded', loadHistory);
</script>
</body>
</html>
